<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ЕГЭ Профиль — Варианты 300-326</title>
    <script src="data.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --orange: #d29922;
            --red: #f85149;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        /* ===== Apple Watch (under 200px) ===== */
        @media (max-width: 200px) {
            html { font-size: 9px; }
            body { padding: 1px; }
            .header { padding: 3px; }
            .header h1 { font-size: 12px; }
            .header .sub { font-size: 8px; }
            .variant-nav { gap: 2px; padding: 2px 0; }
            .variant-btn { padding: 2px 4px; font-size: 8px; min-width: 18px; }
            .task-nav { gap: 1px; padding: 2px 0; }
            .task-btn { padding: 2px 4px; font-size: 8px; min-width: 16px; }
            .card { padding: 4px; margin: 3px 0; border-radius: 6px; }
            .task-num { font-size: 9px; padding: 1px 4px; }
            .problem-text { font-size: 9px; line-height: 1.3; }
            .answer-box { padding: 3px; font-size: 9px; }
            .answer-value { font-size: 10px; }
            .solution-toggle { padding: 3px; font-size: 8px; }
            .solution { padding: 3px; font-size: 8px; }
            .step { padding: 3px; font-size: 8px; margin-bottom: 4px; }
            .container { padding: 1px; }
        }

        /* ===== Small Watch (201-280px) ===== */
        @media (min-width: 201px) and (max-width: 280px) {
            html { font-size: 11px; }
            body { padding: 2px; }
            .header { padding: 4px; }
            .header h1 { font-size: 13px; }
            .variant-btn { padding: 3px 5px; font-size: 9px; }
            .task-btn { padding: 3px 4px; font-size: 9px; }
            .card { padding: 6px; border-radius: 8px; }
            .container { padding: 3px; }
        }

        /* ===== Mobile (281-600px) ===== */
        @media (min-width: 281px) and (max-width: 600px) {
            .container { padding: 8px; }
        }

        .container {
            max-width: 760px;
            margin: 0 auto;
            padding: 12px;
        }

        /* ===== Header ===== */
        .header {
            text-align: center;
            padding: 16px 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 700;
        }
        .header .sub {
            color: var(--muted);
            font-size: 0.75rem;
            margin-top: 2px;
        }

        /* ===== Variant selector ===== */
        .section-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 0 4px;
            font-weight: 600;
        }

        .variant-nav {
            display: flex;
            gap: 4px;
            padding: 4px 0 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            flex-wrap: wrap;
            justify-content: center;
        }
        .variant-btn {
            background: var(--card);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 7px;
            font-size: 0.7rem;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
            min-width: 28px;
            text-align: center;
            font-weight: 600;
        }
        .variant-btn:hover { border-color: var(--accent); color: var(--text); }
        .variant-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ===== Task filter ===== */
        .task-nav {
            display: flex;
            gap: 4px;
            padding: 4px 0 10px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            justify-content: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        .task-btn {
            background: var(--card);
            color: var(--muted);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 0.75rem;
            cursor: pointer;
            min-width: 26px;
            text-align: center;
            font-weight: 600;
            transition: all 0.15s;
        }
        .task-btn:hover { border-color: var(--green); color: var(--text); }
        .task-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

        /* ===== Cards ===== */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }
        .card.hidden { display: none; }

        .task-header {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .task-num {
            background: var(--accent);
            color: #fff;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.8rem;
        }
        .task-topic {
            color: var(--muted);
            font-size: 0.7rem;
        }

        .problem-text {
            font-size: 0.9rem;
            line-height: 1.55;
            margin-bottom: 10px;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .answer-box {
            background: rgba(63, 185, 80, 0.08);
            border: 1px solid var(--green);
            border-radius: 7px;
            padding: 8px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.15s;
        }
        .answer-box:active { background: rgba(63, 185, 80, 0.2); }
        .answer-label {
            font-weight: 700;
            color: var(--green);
            font-size: 0.8rem;
        }
        .answer-value {
            font-size: 1.05rem;
            font-weight: 700;
            margin-top: 2px;
            display: none;
        }
        .answer-box.revealed .answer-value { display: block; }
        .answer-box .tap-hint { font-size: 0.65rem; color: var(--muted); }
        .answer-box.revealed .tap-hint { display: none; }

        .solution-toggle {
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 7px;
            padding: 7px 12px;
            font-size: 0.8rem;
            cursor: pointer;
            width: 100%;
            text-align: left;
            font-weight: 600;
            transition: all 0.15s;
        }
        .solution-toggle:hover { background: rgba(88, 166, 255, 0.15); }

        .solution {
            display: none;
            margin-top: 8px;
            padding: 10px;
            background: rgba(88, 166, 255, 0.04);
            border-radius: 7px;
            border: 1px solid var(--border);
        }
        .solution.open { display: block; }

        .step {
            margin-bottom: 8px;
            padding: 6px 8px;
            border-left: 3px solid var(--accent);
            font-size: 0.82rem;
            line-height: 1.55;
        }
        .step:last-child { margin-bottom: 0; }
        .step-title {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.75rem;
            margin-bottom: 2px;
        }
        .formula {
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            background: rgba(255,255,255,0.05);
            padding: 1px 5px;
            border-radius: 3px;
            font-size: 0.88em;
            word-break: break-all;
        }

        .source {
            text-align: center;
            padding: 14px 8px;
            color: var(--muted);
            font-size: 0.65rem;
            border-top: 1px solid var(--border);
            margin-top: 16px;
        }
        .source a { color: var(--accent); text-decoration: none; }

        #cards-container { min-height: 200px; }

        .variant-info {
            text-align: center;
            color: var(--orange);
            font-weight: 600;
            font-size: 0.85rem;
            padding: 8px 0 4px;
        }

        .no-solution {
            color: var(--muted);
            font-size: 0.8rem;
            font-style: italic;
            padding: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ЕГЭ Профиль 2026</h1>
            <div class="sub">Варианты 300-326 &middot; Часть 1 &middot; Ответы и решения</div>
        </div>

        <div class="section-label">Вариант</div>
        <div class="variant-nav" id="variant-nav"></div>

        <div class="variant-info" id="variant-info"></div>

        <div class="section-label">Задание</div>
        <div class="task-nav" id="task-nav"></div>

        <div id="cards-container"></div>

        <div class="source">
            Задания и ответы: <a href="https://math100.ru/prof-var/" target="_blank">math100.ru</a>
        </div>
    </div>

    <script>
    // Task topics by number
    const TOPICS = {
        1: 'Планиметрия',
        2: 'Векторы / Стереометрия',
        3: 'Стереометрия',
        4: 'Вероятность',
        5: 'Теоремы вероятностей',
        6: 'Уравнения',
        7: 'Выражения',
        8: 'Производная / график',
        9: 'Прикладная задача',
        10: 'Текстовая задача',
        11: 'Функция / график',
        12: 'Наиб./наим. значение'
    };

    let currentVariant = 300;
    let currentTaskFilter = 'all';

    // Build variant buttons
    const variantNav = document.getElementById('variant-nav');
    for (let v = 300; v <= 326; v++) {
        const btn = document.createElement('button');
        btn.className = 'variant-btn' + (v === 300 ? ' active' : '');
        btn.textContent = v;
        btn.onclick = () => selectVariant(v);
        btn.id = 'vbtn-' + v;
        variantNav.appendChild(btn);
    }

    // Build task filter buttons
    const taskNav = document.getElementById('task-nav');
    const allBtn = document.createElement('button');
    allBtn.className = 'task-btn active';
    allBtn.textContent = 'Все';
    allBtn.onclick = () => filterTask('all');
    allBtn.id = 'tbtn-all';
    taskNav.appendChild(allBtn);
    for (let t = 1; t <= 12; t++) {
        const btn = document.createElement('button');
        btn.className = 'task-btn';
        btn.textContent = t;
        btn.onclick = () => filterTask(t);
        btn.id = 'tbtn-' + t;
        taskNav.appendChild(btn);
    }

    function selectVariant(v) {
        currentVariant = v;
        document.querySelectorAll('.variant-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('vbtn-' + v).classList.add('active');
        renderCards();
    }

    function filterTask(t) {
        currentTaskFilter = t;
        document.querySelectorAll('.task-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tbtn-' + (t === 'all' ? 'all' : t)).classList.add('active');
        applyFilter();
    }

    function applyFilter() {
        document.querySelectorAll('.card').forEach(c => {
            if (currentTaskFilter === 'all') {
                c.classList.remove('hidden');
            } else {
                c.classList.toggle('hidden', parseInt(c.dataset.task) !== currentTaskFilter);
            }
        });
    }

    function esc(s) {
        return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderCards() {
        const v = VARIANTS[currentVariant];
        if (!v) return;

        const info = document.getElementById('variant-info');
        info.textContent = 'Вариант ' + currentVariant;

        const container = document.getElementById('cards-container');
        let html = '';

        for (let t = 1; t <= 12; t++) {
            const taskData = v[t] || v[String(t)] || {};
            const taskText = taskData.text || '';
            const answer = taskData.answer || '—';
            const solution = taskData.solution || '<div class="step">Решение в разработке</div>';
            const topic = TOPICS[t] || '';
            const hidden = (currentTaskFilter !== 'all' && currentTaskFilter !== t) ? ' hidden' : '';

            html += '<div class="card' + hidden + '" data-task="' + t + '">';
            html += '<div class="task-header">';
            html += '<span class="task-num">№' + t + '</span>';
            html += '<span class="task-topic">' + topic + '</span>';
            html += '</div>';
            html += '<div class="problem-text">' + esc(taskText) + '</div>';
            html += '<div class="answer-box" onclick="this.classList.toggle(\'revealed\')">';
            html += '<div class="answer-label">Ответ <span class="tap-hint">(нажми)</span></div>';
            html += '<div class="answer-value">' + esc(answer) + '</div>';
            html += '</div>';
            html += '<button class="solution-toggle" onclick="toggleSol(this)">Решение</button>';
            html += '<div class="solution">' + solution + '</div>';
            html += '</div>';
        }

        container.innerHTML = html;
    }

    function toggleSol(btn) {
        const sol = btn.nextElementSibling;
        sol.classList.toggle('open');
        btn.textContent = sol.classList.contains('open') ? 'Скрыть решение' : 'Решение';
    }

    // Initial render
    renderCards();
    </script>
</body>
</html>
